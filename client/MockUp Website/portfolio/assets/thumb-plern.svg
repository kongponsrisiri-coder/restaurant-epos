<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="plern-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4EBDC"/>
      <stop offset="0.55" stop-color="#EFE3CF"/>
      <stop offset="1" stop-color="#E5D6BC"/>
    </linearGradient>
    <radialGradient id="plern-glow" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#FFF6E6" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#FFF6E6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#plern-bg)"/>
  <rect width="1600" height="1000" fill="url(#plern-glow)"/>

  <!-- Subtle taupe circle accents -->
  <circle cx="120" cy="120" r="160" fill="#B5A285" opacity="0.07"/>
  <circle cx="1480" cy="900" r="200" fill="#A88458" opacity="0.08"/>

  <!-- Thin gold frame -->
  <rect x="40" y="40" width="1520" height="920" fill="none" stroke="#A88458" stroke-width="1" opacity="0.55"/>

  <!-- Eyebrow -->
  <text x="800" y="280" text-anchor="middle"
        font-family="'Inter', system-ui, sans-serif"
        font-size="22" font-weight="600"
        letter-spacing="8" fill="#A88458">
    MODERN LUXURY THAI BISTRO · LONDON
  </text>

  <!-- Wordmark -->
  <text x="800" y="540" text-anchor="middle"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-size="260" font-weight="500" fill="#25221E"
        letter-spacing="-6">Plern.</text>

  <!-- Tagline -->
  <text x="800" y="640" text-anchor="middle"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-style="italic" font-size="40" font-weight="400"
        fill="#4A4641" letter-spacing="1">
    Authentic Roots. Modern Methods.
  </text>
  <text x="800" y="690" text-anchor="middle"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-style="italic" font-size="40" font-weight="400"
        fill="#4A4641" letter-spacing="1">
    The Art of Joyful Immersion.
  </text>

  <!-- Ornament -->
  <g transform="translate(800,790)">
    <circle cx="-90" cy="0" r="5" fill="#A88458"/>
    <line x1="-70" y1="0" x2="70" y2="0" stroke="#A88458" stroke-width="1.5"/>
    <circle cx="90" cy="0" r="5" fill="#A88458"/>
  </g>

  <!-- Bottom tag -->
  <text x="800" y="900" text-anchor="middle"
        font-family="'Inter', system-ui, sans-serif"
        font-size="18" font-weight="600"
        letter-spacing="6" fill="#8A7860">
    HIGH-END BISTRO · SOUS-VIDE PRECISION
  </text>
</svg>
